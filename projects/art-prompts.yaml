# art-prompts.yaml — Image catalog for Conductor project assets
#
# Three images per project:
#   icon  — square 1:1 (256×256 min). Used in nav, sidebar, card headers, favicons.
#   card  — portrait 2:3 (512×768 min). Shown on the workspace project card.
#   hero  — landscape 16:9 (1280×720 min). Shown as a banner/header in project view.
#
# Workflow:
#   1. Copy the prompt into ChatGPT (image generation) or call the OpenAI Images API (model: gpt-image-1).
#   2. Set the correct aspect ratio in the generation UI (1:1 / 2:3 / 16:9).
#   3. Export as .webp at the minimum size listed above.
#   4. Save to the image_path listed below (relative to repo root).
#      OR — easier — run `python scripts/serve_workspace.py`, open
#      http://localhost:8000, and click any placeholder image to upload directly.
#   5. The workspace rebuilds and swaps in your image automatically.
#
# Status values: pending | done

images:

  - project: conductor
    icon:
      image_path: projects/images/conductor-icon.webp
      status: pending
      size: "256x256"
      prompt: >
        flat minimal app icon, orchestral conductor robot silhouette holding a
        glowing baton aloft, teal and deep indigo palette, bold clean vector
        shapes, square composition, no text
    card:
      image_path: projects/images/conductor-card.webp
      status: pending
      size: "512x768"
      prompt: >
        flat minimal portrait illustration, orchestral conductor robot gesturing
        upward directing a glowing circuit-node network, teal and deep indigo
        palette, subject centered with dark atmospheric backdrop, no text,
        2:3 portrait composition
    hero:
      image_path: projects/images/conductor-hero.webp
      status: pending
      size: "1280x720"
      prompt: >
        flat minimal wide panoramic, orchestral conductor robot before a vast
        network of glowing circuit-board constellations spanning the horizon,
        teal and deep indigo, cinematic scale, no text, 16:9 landscape

